AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SecureBank Dev - Stack 3/5 - ECR Container Registry & IAM Roles
  Creates the ECR repository, ECS task execution role, and ECS task role
  with least-privilege permissions (KMS + Secrets Manager only).
  Deploy AFTER stack 02-security-db.yaml.

Parameters:
  ProjectName:
    Type: String
    Default: securebank

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  ImageRetentionCount:
    Type: Number
    Default: 10
    Description: >
      Number of container images to keep in ECR. Older images are auto-deleted
      to stay within the free 500 MB tier.

  GitHubOrg:
    Type: String
    Description: Your GitHub organisation or username (e.g. myorg)
    Default: chadalawada-hub

  GitHubRepo:
    Type: String
    Description: Your GitHub repository name (e.g. securebank)
    Default: securebank

Resources:

  # ─── ECR Repository ──────────────────────────────────────────
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub ${ProjectName}-${Environment}-api
      ImageScanningConfiguration:
        ScanOnPush: true              # Free security scan on every push
      EncryptionConfiguration:
        EncryptionType: KMS
        KmsKey: !ImportValue
          Fn::Sub: ${ProjectName}-${Environment}-KmsKeyArn
      ImageTagMutability: MUTABLE
      LifecyclePolicy:
        # Keep only the last N images — prevents ECR storage costs creeping up
        LifecyclePolicyText: !Sub |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep only last ${ImageRetentionCount} images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPrefixList": ["v", "sha-"],
                  "countType": "imageCountMoreThan",
                  "countNumber": ${ImageRetentionCount}
                },
                "action": {"type": "expire"}
              },
              {
                "rulePriority": 2,
                "description": "Delete untagged images after 1 day",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 1
                },
                "action": {"type": "expire"}
              }
            ]
          }
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── ECS Task Execution Role ──────────────────────────────────
  # Used by ECS control plane to: pull images from ECR, push logs to
  # CloudWatch, and fetch secrets from Secrets Manager at container startup.
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-task-exec-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Allow reading only our project's secrets
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}/${Environment}/*
              # Allow KMS decrypt for secrets encrypted with our CMK
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-KmsKeyArn
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── ECS Task Role ────────────────────────────────────────────
  # Attached to the running container. Grants ONLY what the
  # FastAPI app needs at runtime: KMS encrypt/decrypt for PII fields.
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KmsPiiAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Least privilege: only the two KMS operations the app needs
              - Effect: Allow
                Action:
                  - kms:GenerateDataKey
                  - kms:Decrypt
                Resource:
                  - !ImportValue
                    Fn::Sub: ${ProjectName}-${Environment}-KmsKeyArn
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${ProjectName}-${Environment}*
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── GitHub Actions Deploy Role ───────────────────────────────
  # This role is assumed by GitHub Actions via OIDC (no stored AWS keys).
  # Grants the minimum permissions to build and deploy: push to ECR,
  # update ECS service, read CFN outputs.
  GitHubActionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-github-actions-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          # OIDC trust — GitHub Actions can assume this role without stored keys
          # Replace YOUR_GITHUB_ORG/YOUR_REPO with your actual values
          - Effect: Allow
            Principal:
              Federated: !Sub arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOrg}/${GitHubRepo}:*
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      Policies:
        - PolicyName: EcrPushPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:DescribeRepositories
                  - ecr:ListImages
                Resource: !GetAtt EcrRepository.Arn
        - PolicyName: EcsDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                  - ecs:ListTaskDefinitions
                  - ecs:RunTask
                  - ecs:DescribeTasks
                Resource: "*"
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !GetAtt EcsTaskExecutionRole.Arn
                  - !GetAtt EcsTaskRole.Arn
        - PolicyName: CfnReadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:ListExports
                Resource: "*"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ─── GitHub OIDC Provider ─────────────────────────────────────
  # Registers GitHub as a trusted identity provider.
  # Only needs to be created once per AWS account.
  # If it already exists in your account, comment this resource out.
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

Outputs:
  EcrRepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri
    Export: {Name: !Sub '${ProjectName}-${Environment}-EcrUri'}

  EcrRepositoryArn:
    Value: !GetAtt EcrRepository.Arn
    Export: {Name: !Sub '${ProjectName}-${Environment}-EcrArn'}

  TaskExecutionRoleArn:
    Value: !GetAtt EcsTaskExecutionRole.Arn
    Export: {Name: !Sub '${ProjectName}-${Environment}-TaskExecRoleArn'}

  TaskRoleArn:
    Value: !GetAtt EcsTaskRole.Arn
    Export: {Name: !Sub '${ProjectName}-${Environment}-TaskRoleArn'}

  GitHubActionsRoleArn:
    Value: !GetAtt GitHubActionsRole.Arn
    Description: Add this ARN as GitHub secret AWS_ROLE_ARN
    Export: {Name: !Sub '${ProjectName}-${Environment}-GitHubActionsRoleArn'}