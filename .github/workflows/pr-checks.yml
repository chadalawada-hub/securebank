# ═══════════════════════════════════════════════════════════════════════════
# SecureBank — Pull Request Checks
# ───────────────────────────────────────────────────────────────────────────
# Runs on every PR: tests, lint, security scan, dependency audit.
# Must pass before merging. No AWS credentials needed.
# ═══════════════════════════════════════════════════════════════════════════
name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Backend: Tests + Lint + Type Check
  # ═══════════════════════════════════════════════════════════════
  backend-checks:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install all dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov httpx ruff mypy

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          SECRET_KEY: "ci-test-secret-key-not-real"
          KMS_KEY_ARN: "arn:aws:kms:us-east-1:123456789:key/test"
          APP_ENV: "test"
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short -v

  # ═══════════════════════════════════════════════════════════════
  # Security: Dependency Vulnerability Scan
  # ═══════════════════════════════════════════════════════════════
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          pip-audit -r requirements.txt \
            --output json \
            --output-file audit-report.json || true
          pip-audit -r requirements.txt

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit
          path: backend/audit-report.json

  # ═══════════════════════════════════════════════════════════════
  # Docker: Build check (no push)
  # ═══════════════════════════════════════════════════════════════
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: securebank-api:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════
  # CloudFormation: Validate templates
  # ═══════════════════════════════════════════════════════════════
  cfn-validate:
    name: Validate CloudFormation
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'cloudformation/')
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: PR-validate-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate templates
        run: |
          for f in cloudformation/*.yaml; do
            echo "Validating $f..."
            aws cloudformation validate-template --template-body file://$f
            echo "✅ $f"
          done
