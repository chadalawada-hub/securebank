AWSTemplateFormatVersion: '2010-09-09'
Description: >
  SecureBank Dev - Stack 1/5 - VPC & Networking
  Cost-optimised: VPC Endpoints replace NAT Gateway (saves ~$35/mo).
  Deploy FIRST. All other stacks import outputs from this one.

# ═══════════════════════════════════════════════════════════════
# PARAMETERS
# ═══════════════════════════════════════════════════════════════
Parameters:
  ProjectName:
    Type: String
    Default: securebank
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  EnableVpcEndpoints:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      Set false if putting Fargate in public subnets (saves ~$29/mo more).
      Recommended true for proper dev/prod parity.

# ═══════════════════════════════════════════════════════════════
# CONDITIONS
# ═══════════════════════════════════════════════════════════════
Conditions:
  CreateEndpoints: !Equals [!Ref EnableVpcEndpoints, "true"]

# ═══════════════════════════════════════════════════════════════
# RESOURCES
# ═══════════════════════════════════════════════════════════════
Resources:

  # ─── VPC ────────────────────────────────────────────────────
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-vpc
        - Key: Environment
          Value: !Ref Environment

  # ─── Internet Gateway ────────────────────────────────────────
  IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  # ─── Public Subnets (ALB lives here) ────────────────────────
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-public-b

  # ─── Private App Subnets (Fargate) ───────────────────────────
  AppSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-app-a

  AppSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-app-b

  # ─── Private DB Subnets (RDS) ────────────────────────────────
  DbSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.21.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-db-a

  DbSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.22.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${Environment}-db-b

  # ─── Route Tables ────────────────────────────────────────────
  PublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-${Environment}-public-rt'}]

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  PubSubnetARTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRT

  PubSubnetBRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRT

  PrivateRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-${Environment}-private-rt'}]

  AppSubnetARTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppSubnetA
      RouteTableId: !Ref PrivateRT

  AppSubnetBRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppSubnetB
      RouteTableId: !Ref PrivateRT

  DbSubnetARTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DbSubnetA
      RouteTableId: !Ref PrivateRT

  DbSubnetBRTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DbSubnetB
      RouteTableId: !Ref PrivateRT

  # ─── Security Groups ─────────────────────────────────────────
  AlbSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-${Environment}-alb-sg
      GroupDescription: ALB - HTTP/HTTPS from internet
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0, Description: HTTP}
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0, Description: HTTPS}
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-${Environment}-alb-sg'}]

  FargateSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-${Environment}-fargate-sg
      GroupDescription: Fargate - port 8000 from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref AlbSG
          Description: FastAPI from ALB
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-${Environment}-fargate-sg'}]

  RdsSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-${Environment}-rds-sg
      GroupDescription: RDS - port 5432 from Fargate only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref FargateSG
          Description: PostgreSQL from Fargate
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-${Environment}-rds-sg'}]

  VpceSG:
    Type: AWS::EC2::SecurityGroup
    Condition: CreateEndpoints
    Properties:
      GroupName: !Sub ${ProjectName}-${Environment}-vpce-sg
      GroupDescription: VPC Endpoints - HTTPS from private subnets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref FargateSG
          Description: HTTPS from Fargate to AWS endpoints
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-${Environment}-vpce-sg'}]

  # ─── VPC Endpoints (NAT Gateway replacement) ─────────────────
  # S3 Gateway Endpoint - completely FREE
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      RouteTableIds: [!Ref PrivateRT]

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.api
      VpcEndpointType: Interface
      SubnetIds: [!Ref AppSubnetA, !Ref AppSubnetB]
      SecurityGroupIds: [!Ref VpceSG]
      PrivateDnsEnabled: true

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.ecr.dkr
      VpcEndpointType: Interface
      SubnetIds: [!Ref AppSubnetA, !Ref AppSubnetB]
      SecurityGroupIds: [!Ref VpceSG]
      PrivateDnsEnabled: true

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.secretsmanager
      VpcEndpointType: Interface
      SubnetIds: [!Ref AppSubnetA, !Ref AppSubnetB]
      SecurityGroupIds: [!Ref VpceSG]
      PrivateDnsEnabled: true

  CloudWatchLogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.logs
      VpcEndpointType: Interface
      SubnetIds: [!Ref AppSubnetA, !Ref AppSubnetB]
      SecurityGroupIds: [!Ref VpceSG]
      PrivateDnsEnabled: true

  KmsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: CreateEndpoints
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub com.amazonaws.${AWS::Region}.kms
      VpcEndpointType: Interface
      SubnetIds: [!Ref AppSubnetA, !Ref AppSubnetB]
      SecurityGroupIds: [!Ref VpceSG]
      PrivateDnsEnabled: true

# ═══════════════════════════════════════════════════════════════
# OUTPUTS (exported for cross-stack imports)
# ═══════════════════════════════════════════════════════════════
Outputs:
  VpcId:
    Value: !Ref VPC
    Export: {Name: !Sub '${ProjectName}-${Environment}-VpcId'}

  PublicSubnetA:
    Value: !Ref PublicSubnetA
    Export: {Name: !Sub '${ProjectName}-${Environment}-PublicSubnetA'}

  PublicSubnetB:
    Value: !Ref PublicSubnetB
    Export: {Name: !Sub '${ProjectName}-${Environment}-PublicSubnetB'}

  AppSubnetA:
    Value: !Ref AppSubnetA
    Export: {Name: !Sub '${ProjectName}-${Environment}-AppSubnetA'}

  AppSubnetB:
    Value: !Ref AppSubnetB
    Export: {Name: !Sub '${ProjectName}-${Environment}-AppSubnetB'}

  DbSubnetA:
    Value: !Ref DbSubnetA
    Export: {Name: !Sub '${ProjectName}-${Environment}-DbSubnetA'}

  DbSubnetB:
    Value: !Ref DbSubnetB
    Export: {Name: !Sub '${ProjectName}-${Environment}-DbSubnetB'}

  AlbSGId:
    Value: !Ref AlbSG
    Export: {Name: !Sub '${ProjectName}-${Environment}-AlbSGId'}

  FargateSGId:
    Value: !Ref FargateSG
    Export: {Name: !Sub '${ProjectName}-${Environment}-FargateSGId'}

  RdsSGId:
    Value: !Ref RdsSG
    Export: {Name: !Sub '${ProjectName}-${Environment}-RdsSGId'}
