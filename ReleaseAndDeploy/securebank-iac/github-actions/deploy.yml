# ═══════════════════════════════════════════════════════════════════════════
# SecureBank — Main CI/CD Pipeline
# ───────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Push to `main`    → deploy to dev environment
#   • Push to `release` → deploy to prod environment  (add later)
#   • Pull request      → run tests + lint only (no deploy)
#
# Architecture:
#   GitHub OIDC → AWS Role (no stored AWS keys ever)
#   GitHub → build → ECR → ECS Fargate rolling update
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ROLE_ARN           ARN from CFN stack 03 output GitHubActionsRoleArn
#   AWS_REGION             e.g. us-east-1
#   PROJECT_NAME           e.g. securebank
#   ENVIRONMENT            e.g. dev
#
# Optional secrets for Slack / notifications:
#   SLACK_WEBHOOK_URL      Incoming webhook for deploy notifications
# ═══════════════════════════════════════════════════════════════════════════
name: Deploy — SecureBank

on:
  push:
    branches:
      - main           # → dev environment
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

# Only allow one deploy at a time per environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Don't cancel a running deploy — wait for it

# ─── Global environment variables ────────────────────────────────────────
env:
  AWS_REGION:    ${{ secrets.AWS_REGION }}
  PROJECT_NAME:  ${{ secrets.PROJECT_NAME }}
  ENVIRONMENT:   ${{ secrets.ENVIRONMENT }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Test & Lint
  # Runs on every push and PR. Fast feedback without deploying.
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov httpx ruff

      - name: Lint with Ruff
        run: |
          ruff check . --output-format=github
          ruff format --check .

      - name: Run tests with coverage
        env:
          # Use SQLite for unit tests — no real DB needed
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          SECRET_KEY: "test-secret-key-for-ci-only-not-real"
          KMS_KEY_ARN: "arn:aws:kms:us-east-1:123456789:key/test"
          APP_ENV: "test"
          AWS_DEFAULT_REGION: "us-east-1"
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Build & Push Docker Image to ECR
  # Only runs on push to main (not on PRs)
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image_uri:    ${{ steps.build.outputs.image_uri }}
      image_tag:    ${{ steps.build.outputs.image_tag }}
      ecr_registry: ${{ steps.login.outputs.registry }}

    permissions:
      id-token: write    # Required for OIDC authentication to AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: tag
        run: |
          # Short SHA + timestamp for unique, traceable tags
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "tag=sha-${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Get ECR URI from CloudFormation
        id: ecr
        run: |
          ECR_URI=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENVIRONMENT}-EcrUri'].Value" \
            --output text)
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx (for layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.uri }}:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr.outputs.uri }}:latest
          # GitHub Actions cache makes subsequent builds 2-3x faster
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_ENV=${{ env.ENVIRONMENT }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Output image details
        id: final
        run: |
          echo "image_uri=${{ steps.ecr.outputs.uri }}:${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "## 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- **URI:** \`${{ steps.ecr.outputs.uri }}:${{ steps.tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Run Database Migrations
  # Runs as a one-off ECS task before updating the service
  # ═══════════════════════════════════════════════════════════════
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-migrate-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get infrastructure values from CloudFormation
        id: cfn
        run: |
          get_export() {
            aws cloudformation list-exports \
              --query "Exports[?Name=='${PROJECT_NAME}-${ENVIRONMENT}-$1'].Value" \
              --output text
          }
          echo "cluster=$(get_export ClusterName)"    >> $GITHUB_OUTPUT
          echo "task_def=$(get_export TaskDefArn)"    >> $GITHUB_OUTPUT
          echo "subnet_a=$(get_export AppSubnetA)"    >> $GITHUB_OUTPUT
          echo "fargate_sg=$(get_export FargateSGId)" >> $GITHUB_OUTPUT

      - name: Run migration task
        id: migrate
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ steps.cfn.outputs.cluster }}" \
            --task-definition "${{ steps.cfn.outputs.task_def }}" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ steps.cfn.outputs.subnet_a }}],
              securityGroups=[${{ steps.cfn.outputs.fargate_sg }}],
              assignPublicIp=DISABLED
            }" \
            --overrides '{
              "containerOverrides": [{
                "name": "securebank-api",
                "image": "${{ needs.build.outputs.image_uri }}",
                "command": ["python", "migrate.py"],
                "environment": [
                  {"name": "RUN_MODE", "value": "migrate"}
                ]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=${TASK_ARN}" >> $GITHUB_OUTPUT
          echo "🔄 Migration task started: ${TASK_ARN}"

      - name: Wait for migration to complete
        run: |
          echo "Waiting for migration task to finish..."
          aws ecs wait tasks-stopped \
            --cluster "${{ steps.cfn.outputs.cluster }}" \
            --tasks "${{ steps.migrate.outputs.task_arn }}"

      - name: Check migration exit code
        run: |
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ steps.cfn.outputs.cluster }}" \
            --tasks "${{ steps.migrate.outputs.task_arn }}" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration failed with exit code: ${EXIT_CODE}"
            echo "Check CloudWatch logs: /ecs/${PROJECT_NAME}-${ENVIRONMENT}"
            exit 1
          fi
          echo "✅ Migration completed successfully (exit code: ${EXIT_CODE})"

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: Deploy to ECS
  # Updates the ECS service with the new image (rolling update)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: ${{ secrets.ENVIRONMENT }}
      url: https://dev.yourdomain.com    # Update this to your actual URL

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get infrastructure values from CloudFormation
        id: cfn
        run: |
          get_export() {
            aws cloudformation list-exports \
              --query "Exports[?Name=='${PROJECT_NAME}-${ENVIRONMENT}-$1'].Value" \
              --output text
          }
          echo "cluster=$(get_export ClusterName)"     >> $GITHUB_OUTPUT
          echo "service=$(get_export ServiceName)"     >> $GITHUB_OUTPUT
          echo "task_def=$(get_export TaskDefArn)"     >> $GITHUB_OUTPUT
          echo "exec_role=$(get_export TaskExecRoleArn)" >> $GITHUB_OUTPUT
          echo "task_role=$(get_export TaskRoleArn)"   >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          # Get the current task def without metadata fields
          aws ecs describe-task-definition \
            --task-definition "${{ steps.cfn.outputs.task_def }}" \
            --query taskDefinition \
            | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: securebank-api
          image: ${{ needs.build.outputs.image_uri }}
          environment-variables: |
            APP_ENV=${{ env.ENVIRONMENT }}
            BUILD_SHA=${{ github.sha }}

      - name: Deploy to ECS (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ steps.cfn.outputs.service }}
          cluster: ${{ steps.cfn.outputs.cluster }}
          wait-for-service-stability: true
          # Rolls back automatically if ECS circuit breaker fires
          # (configured in CFN: DeploymentCircuitBreaker.Rollback=true)

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(aws cloudformation list-exports \
            --query "Exports[?Name=='${PROJECT_NAME}-${ENVIRONMENT}-FrontendBucket'].Value" \
            --output text)

          aws s3 sync ./frontend/ s3://${BUCKET}/ \
            --delete \
            --cache-control "max-age=86400" \
            --exclude ".DS_Store" \
            --exclude "*.map"

          echo "✅ Frontend deployed to s3://${BUCKET}"

      - name: Write deployment summary
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ env.ENVIRONMENT }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ needs.build.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed By | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster | \`${{ steps.cfn.outputs.cluster }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Service | \`${{ steps.cfn.outputs.service }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"✅ *SecureBank deployed* to \`${{ env.ENVIRONMENT }}\`\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"short\": true},
                  {\"title\": \"By\", \"value\": \"\`@${{ github.actor }}\`\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"\`${GITHUB_SHA:0:7}\`\", \"short\": true},
                  {\"title\": \"Tag\", \"value\": \"\`${{ needs.build.outputs.image_tag }}\`\", \"short\": true}
                ]
              }]
            }"

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *SecureBank deploy FAILED* on \`${{ env.ENVIRONMENT }}\`\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"short\": true},
                  {\"title\": \"By\", \"value\": \"\`@${{ github.actor }}\`\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\", \"short\": false}
                ]
              }]
            }"
