# ═══════════════════════════════════════════════════════════════════════════
# SecureBank — Infrastructure Deployment Pipeline
# ───────────────────────────────────────────────────────────────────────────
# Deploys all 5 CloudFormation stacks in order when changes are pushed
# to the cloudformation/ directory. Also supports manual trigger for
# fresh environment creation.
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN           ARN of the bootstrap IAM role (see README)
#   AWS_REGION             e.g. us-east-1
#   PROJECT_NAME           e.g. securebank
#   ENVIRONMENT            e.g. dev
#   ACM_CERTIFICATE_ARN    ACM cert ARN for your domain
#   HOSTED_ZONE_ID         Route 53 hosted zone ID
#   API_DOMAIN_NAME        e.g. dev.api.yourdomain.com
#   FRONTEND_DOMAIN_NAME   e.g. dev.yourdomain.com
#   GITHUB_ORG             Your GitHub org/username
#   GITHUB_REPO_NAME       Your repository name
# ═══════════════════════════════════════════════════════════════════════════
name: Deploy Infrastructure (CloudFormation)

on:
  push:
    branches: [main]
    paths:
      - 'cloudformation/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: deploy
        type: choice
        options:
          - deploy         # Create or update stacks
          - teardown       # DELETE all stacks (use with caution!)
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]
      stack:
        description: "Deploy a specific stack only (leave blank for all)"
        required: false
        default: ""
        type: string

concurrency:
  group: infra-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION:   ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
  ENVIRONMENT:  ${{ inputs.environment || secrets.ENVIRONMENT }}

jobs:
  # ═══════════════════════════════════════════════════════════════
  # VALIDATE CloudFormation templates before deploying
  # ═══════════════════════════════════════════════════════════════
  validate:
    name: Validate CloudFormation
    runs-on: ubuntu-latest
    if: ${{ inputs.action != 'teardown' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-validate-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate all CloudFormation templates
        run: |
          echo "Validating CloudFormation templates..."
          FAILED=0
          for template in cloudformation/*.yaml; do
            echo -n "  Validating $template ... "
            if aws cloudformation validate-template \
              --template-body file://$template \
              --query 'Description' --output text 2>&1; then
              echo "  ✅ $template"
            else
              echo "  ❌ $template FAILED"
              FAILED=$((FAILED+1))
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "❌ ${FAILED} template(s) failed validation"
            exit 1
          fi
          echo "✅ All templates valid"

  # ═══════════════════════════════════════════════════════════════
  # DEPLOY all stacks in dependency order
  # ═══════════════════════════════════════════════════════════════
  deploy-infra:
    name: Deploy CloudFormation Stacks
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ inputs.action != 'teardown' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-infra-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Stack 1 — VPC & Networking
        if: ${{ !inputs.stack || inputs.stack == '01-vpc' }}
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/01-vpc.yaml \
            --stack-name ${PROJECT_NAME}-${ENVIRONMENT}-vpc \
            --parameter-overrides \
              ProjectName=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              EnableVpcEndpoints=true \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --tags \
              Project=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              ManagedBy=GitHub-Actions
          echo "✅ Stack 1 (VPC) deployed"

      - name: Deploy Stack 2 — Security & Database
        if: ${{ !inputs.stack || inputs.stack == '02-security-db' }}
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/02-security-db.yaml \
            --stack-name ${PROJECT_NAME}-${ENVIRONMENT}-security-db \
            --parameter-overrides \
              ProjectName=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              DbInstanceClass=db.t3.micro \
              DbAllocatedStorage=20 \
              DbMultiAz=false \
              DbBackupRetentionDays=3 \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --tags \
              Project=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              ManagedBy=GitHub-Actions
          echo "✅ Stack 2 (Security & DB) deployed"

      - name: Deploy Stack 3 — ECR & IAM
        if: ${{ !inputs.stack || inputs.stack == '03-ecr-iam' }}
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/03-ecr-iam.yaml \
            --stack-name ${PROJECT_NAME}-${ENVIRONMENT}-ecr-iam \
            --parameter-overrides \
              ProjectName=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              GitHubOrg=${{ secrets.GITHUB_ORG }} \
              GitHubRepo=${{ secrets.GITHUB_REPO_NAME }} \
              ImageRetentionCount=10 \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --tags \
              Project=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              ManagedBy=GitHub-Actions
          echo "✅ Stack 3 (ECR & IAM) deployed"

      - name: Deploy Stack 4 — ECS, ALB & S3
        if: ${{ !inputs.stack || inputs.stack == '04-ecs-alb' }}
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/04-ecs-alb.yaml \
            --stack-name ${PROJECT_NAME}-${ENVIRONMENT}-ecs-alb \
            --parameter-overrides \
              ProjectName=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              TaskCpu=256 \
              TaskMemory=512 \
              DesiredCount=1 \
              UseFargateSpot=true \
              AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }} \
              LogRetentionDays=14 \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --tags \
              Project=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              ManagedBy=GitHub-Actions
          echo "✅ Stack 4 (ECS & ALB) deployed"

      - name: Deploy Stack 5 — DNS
        if: ${{ !inputs.stack || inputs.stack == '05-dns' }}
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/05-dns.yaml \
            --stack-name ${PROJECT_NAME}-${ENVIRONMENT}-dns \
            --parameter-overrides \
              ProjectName=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              HostedZoneId=${{ secrets.HOSTED_ZONE_ID }} \
              ApiDomainName=${{ secrets.API_DOMAIN_NAME }} \
              FrontendDomainName=${{ secrets.FRONTEND_DOMAIN_NAME }} \
            --no-fail-on-empty-changeset \
            --tags \
              Project=${PROJECT_NAME} \
              Environment=${ENVIRONMENT} \
              ManagedBy=GitHub-Actions
          echo "✅ Stack 5 (DNS) deployed"

      - name: Print stack outputs
        run: |
          echo "## 🏗️ Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for stack in vpc security-db ecr-iam ecs-alb dns; do
            STACK_NAME="${PROJECT_NAME}-${ENVIRONMENT}-${stack}"
            echo "### Stack: \`${STACK_NAME}\`" >> $GITHUB_STEP_SUMMARY
            aws cloudformation describe-stacks \
              --stack-name ${STACK_NAME} \
              --query "Stacks[0].Outputs[*].[OutputKey,OutputValue]" \
              --output table 2>/dev/null || true
            echo "" >> $GITHUB_STEP_SUMMARY
          done

  # ═══════════════════════════════════════════════════════════════
  # TEARDOWN — Delete all stacks (manual trigger only)
  # ═══════════════════════════════════════════════════════════════
  teardown:
    name: Teardown All Stacks
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'teardown' }}
    environment: teardown-approval    # Requires manual approval in GitHub
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-teardown-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete stacks in REVERSE order
        run: |
          delete_stack() {
            local name="$1"
            echo "Deleting stack: ${name}"
            aws cloudformation delete-stack --stack-name ${name} || true
            aws cloudformation wait stack-delete-complete --stack-name ${name} 2>/dev/null || true
            echo "✅ ${name} deleted (or did not exist)"
          }

          # Delete in reverse dependency order
          delete_stack "${PROJECT_NAME}-${ENVIRONMENT}-dns"
          delete_stack "${PROJECT_NAME}-${ENVIRONMENT}-ecs-alb"
          delete_stack "${PROJECT_NAME}-${ENVIRONMENT}-ecr-iam"
          delete_stack "${PROJECT_NAME}-${ENVIRONMENT}-security-db"
          delete_stack "${PROJECT_NAME}-${ENVIRONMENT}-vpc"

          echo "🗑️ All stacks deleted for environment: ${ENVIRONMENT}"
